<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>平仓触发条件</title>

</head>
<body style="margin:0;padding:40px;width:1200px;height:675px;overflow:hidden;background:#ffffff;font-family:Arial,sans-serif;box-sizing:border-box">

<div style="width:1120px;height:595px;position:relative;display:flex;flex-direction:column">
  <div style="text-align:center;margin-bottom:10px">
    <span style="font-size:22px;font-weight:bold;color:#1e293b">平仓触发条件</span>
  </div>
  <div style="display:flex;gap:12px;flex:1">
    
    <div style="flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:12px;background:#fafbfc">
      <div style="text-align:center;font-size:13px;font-weight:bold;color:#334155;margin-bottom:6px">退出线触发（最常见）</div>
      <svg width="370" height="400" viewBox="0 0 370 400">
        <line x1="40" y1="95.1" x2="330" y2="95.1" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="335" y="98.1" font-size="9" fill="#3b82f6">entry</text>
<line x1="40" y1="288.4" x2="330" y2="288.4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="335" y="291.4" font-size="9" fill="#16a34a">exit</text>
<rect x="40" y="95.1" width="290" height="193.3" fill="#dcfce7" opacity="0.3"/>
<polyline points="40.0,95.1 57.1,108.0 74.1,114.4 91.2,127.3 108.2,146.7 125.3,166.0 142.4,178.9 159.4,198.2 176.5,211.1 193.5,224.0 210.6,243.3 227.6,256.2 244.7,269.1 261.8,282.0 278.8,288.4 295.9,291.7 312.9,294.9 330.0,296.2" fill="none" stroke="#3b82f6" stroke-width="2"/>
<circle cx="330.0" cy="296.2" r="5" fill="#16a34a"/>
<text x="325.0" y="286.2" font-size="10" fill="#16a34a" font-weight="bold" text-anchor="end">触发平仓</text>
<line x1="175.0" y1="114.4" x2="175.0" y2="269.1" stroke="#16a34a" stroke-width="1.5"/>
<polygon points="172.0,271.1 178.0,271.1 175.0,277.1" fill="#16a34a"/>
<text x="167.0" y="191.8" font-size="10" fill="#16a34a" text-anchor="end" transform="rotate(-90,167.0,191.8)">利润</text>
<line x1="40" y1="340" x2="330" y2="340" stroke="#e5e7eb" stroke-width="1"/>
      </svg>
    </div>
    <div style="flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:12px;background:#fafbfc">
      <div style="text-align:center;font-size:13px;font-weight:bold;color:#334155;margin-bottom:6px">超时触发</div>
      <svg width="370" height="400" viewBox="0 0 370 400">
        <line x1="40" y1="200" x2="330" y2="200" stroke="#94a3b8" stroke-width="2"/>
<line x1="40.0" y1="195" x2="40.0" y2="205" stroke="#94a3b8" stroke-width="1.5"/>
<text x="40.0" y="220" text-anchor="middle" font-size="10" fill="#64748b">0</text>
<line x1="112.5" y1="195" x2="112.5" y2="205" stroke="#94a3b8" stroke-width="1.5"/>
<text x="112.5" y="220" text-anchor="middle" font-size="10" fill="#64748b">T₁</text>
<line x1="185.0" y1="195" x2="185.0" y2="205" stroke="#94a3b8" stroke-width="1.5"/>
<text x="185.0" y="220" text-anchor="middle" font-size="10" fill="#64748b">T₂</text>
<line x1="257.5" y1="195" x2="257.5" y2="205" stroke="#94a3b8" stroke-width="1.5"/>
<text x="257.5" y="220" text-anchor="middle" font-size="10" fill="#64748b">T₃</text>
<line x1="330.0" y1="195" x2="330.0" y2="205" stroke="#94a3b8" stroke-width="1.5"/>
<text x="330.0" y="220" text-anchor="middle" font-size="10" fill="#64748b">max</text>
<circle cx="330" cy="200" r="6" fill="#f59e0b"/>
<rect x="60" y="245" width="250" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
<text x="185.0" y="268" text-anchor="middle" font-size="12" fill="#92400e" font-weight="bold">持仓超时 + 利润达标</text>
<text x="185.0" y="285" text-anchor="middle" font-size="12" fill="#92400e" font-weight="bold">→ 平仓</text>
<line x1="330" y1="208" x2="300.0" y2="242" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="185.0" y="170" text-anchor="middle" font-size="11" fill="#64748b">max_holding_minutes</text>
<line x1="40" y1="340" x2="330" y2="340" stroke="#e5e7eb" stroke-width="1"/>
      </svg>
    </div>
    <div style="flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:12px;background:#fafbfc">
      <div style="text-align:center;font-size:13px;font-weight:bold;color:#334155;margin-bottom:6px">利润保护</div>
      <svg width="370" height="400" viewBox="0 0 370 400">
        <line x1="40" y1="208.2" x2="330" y2="208.2" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="335" y="211.2" font-size="9" fill="#e11d48">auto_close</text>
<text x="335" y="222.2" font-size="9" fill="#e11d48">min_profit</text>
<line x1="40" y1="260.9" x2="330" y2="260.9" stroke="#e5e7eb" stroke-width="1"/>
<text x="35" y="263.9" text-anchor="end" font-size="9" fill="#94a3b8">0</text>
<rect x="40" y="208.2" width="290" height="52.7" fill="#fef2f2" opacity="0.3"/>
<rect x="40" y="50.0" width="290" height="158.2" fill="#dcfce7" opacity="0.2"/>
<polyline points="40.0,313.6 57.1,300.5 74.1,282.0 91.2,255.6 108.2,234.5 125.3,195.0 142.4,160.7 159.4,129.1 176.5,115.9 193.5,134.4 210.6,150.2 227.6,168.6 244.7,123.8 261.8,102.7 278.8,108.0 295.9,89.5 312.9,76.4 330.0,81.6" fill="none" stroke="#7c3aed" stroke-width="2"/>
<circle cx="125.3" cy="208.2" r="5" fill="#16a34a"/>
<text x="133.3" y="200.2" font-size="10" fill="#16a34a" font-weight="bold">可平仓</text>
<text x="35" y="316.6" text-anchor="end" font-size="9" fill="#94a3b8">-2</text>
<text x="35" y="263.9" text-anchor="end" font-size="9" fill="#94a3b8">0</text>
<text x="35" y="211.2" text-anchor="end" font-size="9" fill="#94a3b8">2</text>
<text x="35" y="158.5" text-anchor="end" font-size="9" fill="#94a3b8">4</text>
<text x="35" y="105.7" text-anchor="end" font-size="9" fill="#94a3b8">6</text>
<text x="35" y="53.0" text-anchor="end" font-size="9" fill="#94a3b8">8</text>
<text x="20" y="195.0" text-anchor="middle" font-size="10" fill="#64748b" transform="rotate(-90,20,195.0)">估算利润</text>
<line x1="40" y1="340" x2="330" y2="340" stroke="#e5e7eb" stroke-width="1"/>
      </svg>
    </div>
  </div>
  <div style="text-align:center;margin-top:10px">
    <span style="font-size:12px;color:#94a3b8">三种条件组合确保在最优时机安全退出</span>
  </div>
</div>
</body>
</html>
