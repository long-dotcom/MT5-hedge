<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="800" height="380" rx="8" fill="#f8fafc"/>

  <!-- State machine -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#334155">断路器状态机</text>

  <!-- CLOSED state -->
  <rect x="80" y="60" width="200" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="180" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">CLOSED</text>
  <text x="180" y="110" text-anchor="middle" font-size="11" fill="#16a34a">正常交易</text>
  <text x="180" y="126" text-anchor="middle" font-size="10" fill="#4ade80">jitter ≤ threshold</text>

  <!-- OPEN state -->
  <rect x="520" y="60" width="200" height="80" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="620" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">OPEN</text>
  <text x="620" y="110" text-anchor="middle" font-size="11" fill="#dc2626">阻断交易</text>
  <text x="620" y="126" text-anchor="middle" font-size="10" fill="#fca5a5">jitter > threshold</text>

  <!-- Trip arrow -->
  <line x1="280" y1="85" x2="515" y2="85" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="320" y="65" width="160" height="24" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="400" y="82" text-anchor="middle" font-size="10" fill="#dc2626">jitter_ratio > threshold</text>

  <!-- Recovery arrow -->
  <path d="M 620 140 L 620 180 Q 620 200 600 200 L 200 200 Q 180 200 180 180 L 180 140" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="320" y="188" width="160" height="24" rx="4" fill="#dcfce7" stroke="#86efac"/>
  <text x="400" y="205" text-anchor="middle" font-size="10" fill="#166534">冷却 3 秒后自动恢复</text>

  <!-- Parameters section -->
  <text x="400" y="255" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">关键参数</text>

  <rect x="60" y="270" width="320" height="90" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="80" y="290" font-size="11" font-weight="600" fill="#1e40af">自适应阈值</text>
  <text x="80" y="308" font-size="10" fill="#475569">冷启动（样本 &lt; 50）：固定阈值 0.75</text>
  <text x="80" y="324" font-size="10" fill="#475569">自适应（样本 ≥ 50）：P75(jitters) × 2.0</text>
  <text x="80" y="340" font-size="10" fill="#475569">检测窗口：5 秒，方向交替频率</text>

  <rect x="420" y="270" width="320" height="90" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="440" y="290" font-size="11" font-weight="600" fill="#92400e">抖动率计算</text>
  <text x="440" y="308" font-size="10" fill="#78350f">jitter = 方向交替次数 / 非零变化次数</text>
  <text x="440" y="324" font-size="10" fill="#78350f">+++++ → jitter = 0（稳定趋势）</text>
  <text x="440" y="340" font-size="10" fill="#78350f">+-+-+ → jitter ≈ 1（高频抖动）</text>

  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">每个品种独立断路器实例，参数从 DB 动态加载，60 秒刷新</text>
</svg>
